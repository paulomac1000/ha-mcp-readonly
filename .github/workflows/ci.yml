name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install linting tools
        run: pip install --break-system-packages ruff mypy bandit

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy tools/ --strict

      - name: bandit
        run: bandit -r tools/ -ll

      - name: Verify version.py matches pyproject.toml
        run: |
          VERSION_PY=$(grep __version__ version.py | cut -d'"' -f2)
          VERSION_TOML=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)
          if [ "$VERSION_PY" != "$VERSION_TOML" ]; then
            echo "ERROR: version mismatch!"
            echo "  version.py:  $VERSION_PY"
            echo "  pyproject.toml: $VERSION_TOML"
            exit 1
          fi
          echo "Versions match: $VERSION_PY"

      - name: Validate documentation (AFDS)
        if: hashFiles('afds_config.yaml') != ''
        run: |
          curl -sS https://raw.githubusercontent.com/paulomac1000/ai-skills/main/skills/afds-doc-writer/docs_validate.py | python3 - \
            --config afds_config.yaml --baseline .afds-baseline.json docs/ ./README.md ./CHANGELOG.md ./AGENTS.md ./CONTRIBUTING.md ./SECURITY.md

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade --break-system-packages pip
          pip install --break-system-packages -r requirements.txt
          pip install --break-system-packages -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=tools \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@a99c28d3f0da835de33ff2feb2e15691c7b9641f  # v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          load: true
          tags: ha-mcp-readonly:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — tool count
        run: |
          docker run --rm -e MCP_DEV_TOOLS_ENABLED=0 ha-mcp-readonly:test python3 -c "
          from server import get_tool_count
          tc = get_tool_count()
          assert tc == 145, f'Expected 145 tools, got {tc}'
          print('Tool count OK:', tc)
          "

      - name: Smoke test — REST API health + tools
        run: |
          docker run -d --rm \
            -p 9099:9091 -p 9100:9093 \
            -e HA_URL=https://localhost:8123 -e HA_TOKEN=fake \
            -e MCP_DEV_TOOLS_ENABLED=0 \
            -e MCP_UNSAFE_PUBLIC_ACCESS_CONFIRMED=1 \
            --name ha-mcp-smoke ha-mcp-readonly:test
          sleep 5
          curl -fsS --retry 10 --retry-delay 2 \
            http://localhost:9099/health || exit 1
          TOOLS=$(curl -s http://localhost:9100/api/tools \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['total'])")
          [ "$TOOLS" = "145" ] \
            || (echo "FAIL: expected 145, got $TOOLS" && exit 1)
          docker stop ha-mcp-smoke

  integration-tests:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      homeassistant:
        image: ghcr.io/home-assistant/home-assistant:stable
        ports:
          - 8123:8123
    env:
      HA_URL: http://homeassistant:8123
      HA_TOKEN: ${{ secrets.HA_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade --break-system-packages pip
          pip install --break-system-packages -r requirements.txt
          pip install --break-system-packages -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/integration/ -q

  smoke-tests:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      homeassistant:
        image: ghcr.io/home-assistant/home-assistant:stable
        ports:
          - 8123:8123
    env:
      HA_URL: http://homeassistant:8123
      HA_TOKEN: ${{ secrets.HA_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade --break-system-packages pip
          pip install --break-system-packages -r requirements.txt
          pip install --break-system-packages -e ".[dev]"

      - name: Run smoke tests
        run: pytest tests/smoke/ -q
