name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install linting tools
        run: pip install ruff mypy bandit

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy tools/ --strict

      - name: bandit
        run: bandit -r tools/ -ll

      - name: Verify version.py matches pyproject.toml
        run: |
          VERSION_PY=$(grep __version__ version.py | cut -d'"' -f2)
          VERSION_TOML=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)
          if [ "$VERSION_PY" != "$VERSION_TOML" ]; then
            echo "ERROR: version mismatch!"
            echo "  version.py:  $VERSION_PY"
            echo "  pyproject.toml: $VERSION_TOML"
            exit 1
          fi
          echo "Versions match: $VERSION_PY"

      - name: Validate documentation (CAFDS)
        if: hashFiles('afds_config.yaml') != ''
        run: |
          curl -sS https://raw.githubusercontent.com/paulomac1000/ai-skills/main/skills/afds-doc-writer/docs_validate.py | python3 - \
            --config afds_config.yaml --strict --baseline .afds-baseline.json ./

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=tools \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ha-mcp-readonly:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — tool count
        run: |
          docker run --rm -e MCP_DEV_TOOLS_ENABLED=0 ha-mcp-readonly:test python3 -c "
          from server import get_tool_count
          tc = get_tool_count()
          assert tc == 134, f'Expected 134 tools, got {tc}'
          print('Tool count OK:', tc)
          "

      - name: Smoke test — REST API health + tools
        run: |
          docker run -d --rm \
            -p 9099:9091 -p 9100:9093 \
            -e HA_URL=https://localhost:8123 -e HA_TOKEN=fake \
            -e MCP_DEV_TOOLS_ENABLED=0 \
            -e MCP_UNSAFE_PUBLIC_ACCESS_CONFIRMED=1 \
            --name ha-mcp-smoke ha-mcp-readonly:test
          sleep 5
          curl -fsS --retry 10 --retry-delay 2 \
            http://localhost:9099/health || exit 1
          TOOLS=$(curl -s http://localhost:9100/api/tools \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['total'])")
          [ "$TOOLS" = "134" ] \
            || (echo "FAIL: expected 134, got $TOOLS" && exit 1)
          docker stop ha-mcp-smoke
