name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run mypy
        run: |
          pip install mypy
          mypy tools/ --strict

      - name: Run bandit
        run: |
          pip install bandit
          bandit -r tools/ -lll

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && format('ghcr.io/{0}:sha-{1}', github.repository, github.sha) || 'ha-mcp-readonly:test' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — tool count
        if: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: |
          docker run --rm ha-mcp-readonly:test python3 -c "
          from server import get_tool_count
          tc = get_tool_count()
          print(f'Tools registered: {tc}')
          assert tc == 120, f'Expected 120 tools, got {tc}'
          print('Tool count verification OK')
          "

      - name: Smoke test — REST API (health + tools)
        if: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: |
          docker run -d --rm -p 9099:9091 -p 9100:9093 \
            -e HA_URL=https://localhost:8123 -e HA_TOKEN=fake \
            -e MCP_UNSAFE_PUBLIC_ACCESS_CONFIRMED=1 \
            --name ha-mcp-smoke ha-mcp-readonly:test
          sleep 3
          curl -fsS http://localhost:9099/health && echo "Health OK"
          TOOLS=$(curl -s http://localhost:9100/api/tools | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['total'])")
          echo "Tools via REST API: $TOOLS"
          [ "$TOOLS" = "120" ] || (echo "FAIL: expected 120, got $TOOLS" && exit 1)
          docker stop ha-mcp-smoke
          echo "REST API smoke test OK"
