name: Semgrep Full Scan (Scheduled)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: semgrep-full
  cancel-in-progress: true

jobs:
  semgrep-full:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Semgrep Full Scan
        run: |
          semgrep ci --sarif --output=semgrep.sarif \
            --config=auto --config=secrets --config=owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Security
        id: upload-sarif
        if: always() && hashFiles('semgrep.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@411bbbe57033eedfc1a82d68c01345aa96c737d7  # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-full

      - name: Warn if SARIF upload failed
        if: always() && steps.upload-sarif.outcome == 'failure'
        run: echo "::warning::SARIF upload failed — check codeql-action reference or permissions"
