[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short -W ignore::authlib.deprecate.AuthlibDeprecationWarning
markers =
    unit: Unit tests (fast, mocked, no I/O)
    integration: Integration tests (slow, requires real Home Assistant)
    smoke: Smoke tests (quick health check, requires local MCP server)
    e2e: End-to-end tests (full pipeline, requires real HA + local MCP server)
